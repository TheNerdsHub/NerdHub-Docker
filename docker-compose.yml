services:
  backend:
    image: ghcr.io/thenerdshub/nerdhub-backend:latest
    ports:
      - "${BACKEND_PORT}:80"
    depends_on:
      - mongo
    environment:
      - ASPNETCORE_URLS=http://+:80 # Set this port to the same as the internal port
      - BACKEND_MONGO_URI=${BACKEND_MONGO_URI}
      - BACKEND_STEAM_API_KEY=${BACKEND_STEAM_API_KEY}
      - BACKEND_CORS_ORIGINS=${BACKEND_CORS_ORIGINS}
    networks:
      nerdhub-network:
        ipv4_address: 172.20.0.2

  frontend:
    image: ghcr.io/thenerdshub/nerdhub-frontend:latest
    ports:
      - "${FRONTEND_PORT}:80"
    depends_on:
      - backend
    environment:
      - API_URL_EXTERNAL=${API_URL_EXTERNAL}
    networks:
      nerdhub-network:
        ipv4_address: 172.20.0.3

  discordbot:
    image: ghcr.io/thenerdshub/nerdhub-discord:latest
    depends_on:
      - mongo
    environment:
      - DISCORD_BOT_TOKEN=${DISCORD_BOT_TOKEN}
      - API_URL_INTERNAL=${API_URL_INTERNAL}
    networks:
      nerdhub-network:
        ipv4_address: 172.20.0.4

  mongo:
    image: mongo
    ports:
      - "${MONGODB_PORT}:27017"
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_INITDB_ROOT_USERNAME}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_INITDB_ROOT_PASSWORD}
    volumes:
      - mongo-data:/data/db
    networks:
      nerdhub-network:
        ipv4_address: 172.20.0.5

